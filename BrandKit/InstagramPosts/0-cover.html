<!doctype html>
<html><head><meta charset="utf-8">
<style>
@font-face { font-family: 'Fraunces'; src: url('../Fraunces-Variable.ttf') format('truetype'); font-weight: 100 900; }
@font-face { font-family: 'Inter'; src: url('../Inter-Variable.ttf') format('truetype'); font-weight: 100 900; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; }
.canvas {
  width: 1080px; height: 1080px; background: #F6F4F2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.word { font-family: 'Fraunces'; font-weight: 500; font-size: 128px; color: #2B2320; letter-spacing: -0.01em; margin-bottom: 28px; }
.headline { font-family: 'Fraunces'; font-weight: 500; font-size: 64px; color: #2B2320; text-align: center; margin-bottom: 36px; }
.headline .accent { color: #E62336; }
.swipe { font-family: 'Inter'; font-weight: 600; font-size: 32px; color: #7A6F66; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="canvas">
  <div class="word">Sofra</div>
  <div class="headline">How it <span class="accent">works.</span></div>
  <div class="swipe">Swipe &rarr;</div>
</div>
</body></html>
