<!doctype html>
<html><head><meta charset="utf-8">
<style>
@font-face { font-family: 'Fraunces'; src: url('../Fraunces-Variable.ttf') format('truetype'); font-weight: 100 900; }
@font-face { font-family: 'Inter'; src: url('../Inter-Variable.ttf') format('truetype'); font-weight: 100 900; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; }
.canvas {
  position: relative;
  width: 1080px; height: 1080px;
  overflow: hidden;
}
.canvas img {
  position: absolute;
  top: 0; left: 0;
  width: 1080px; height: 1080px;
  object-fit: cover;
}
.scrim {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 480px;
  background: linear-gradient(to bottom, rgba(43,35,32,0) 0%, rgba(43,35,32,0.78) 55%, rgba(43,35,32,0.92) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 56px 64px;
}
.word { font-family: 'Fraunces'; font-weight: 600; font-size: 56px; color: #FFFFFF; letter-spacing: -0.02em; margin-bottom: 20px; }
.headline { font-family: 'Fraunces'; font-weight: 500; font-size: 58px; line-height: 1.14; color: #FFFFFF; max-width: 900px; }
.headline .accent { color: #FF5C6C; }
</style>
</head>
<body>
<div class="canvas">
  <img src="source/map-poster.png">
  <div class="scrim">
    <div class="word">Sofra</div>
    <div class="headline">Every halal spot in NYC.<br><span class="accent">Mapped.</span></div>
  </div>
</div>
</body></html>
