<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofra - Halal Food NYC</title>
<style>
@font-face {
  font-family: 'Fraunces';
  src: url('../BrandKit/Fraunces-Variable.ttf') format('truetype');
  font-weight: 100 900;
  font-display: swap;
}
@font-face {
  font-family: 'Inter';
  src: url('../BrandKit/Inter-Variable.ttf') format('truetype');
  font-weight: 100 900;
  font-display: swap;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#FFFFFF; --surface:#F6F4F2; --border:#E7E3DE; --text:#2B2320; --muted:#7A6F66; --red:#E62336; --blue:#007AFF; }
@media (prefers-color-scheme: dark) { :root { --bg:#191210; --surface:#231816; --border:#352A26; --text:#EDE8E4; --muted:#8A7A72; --blue:#4DA3FF; } }
:root[data-theme="light"] { --bg:#FFFFFF; --surface:#F6F4F2; --border:#E7E3DE; --text:#2B2320; --muted:#7A6F66; --blue:#007AFF; }
:root[data-theme="dark"]  { --bg:#191210; --surface:#231816; --border:#352A26; --text:#EDE8E4; --muted:#8A7A72; --blue:#4DA3FF; }

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh; padding: 40px 24px; position: relative; overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(43,35,32,.07) 1.5px, transparent 1.5px);
  background-size: 30px 30px; pointer-events: none; z-index: 0;
}
@media (prefers-color-scheme: dark) {
  body::before { background-image: radial-gradient(circle, rgba(237,232,228,.05) 1.5px, transparent 1.5px); }
}
.page { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; text-align: center; max-width: 600px; width: 100%; }
.eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--red); margin-bottom: 28px; }
h1 { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; font-size: clamp(88px, 18vw, 148px); font-weight: 300; line-height: 0.9; letter-spacing: -0.03em; color: var(--text); margin-bottom: 32px; }
.tagline { font-size: clamp(15px, 2vw, 18px); color: var(--muted); line-height: 1.7; max-width: 380px; margin-bottom: 48px; }
.tagline strong { color: var(--text); font-weight: 500; }
.cta { display: inline-flex; align-items: center; gap: 9px; background: var(--text); color: var(--bg); font-size: 15px; font-weight: 600; padding: 14px 26px; border-radius: 14px; text-decoration: none; transition: opacity 0.15s, transform 0.15s; }
.cta:hover { opacity: 0.85; transform: translateY(-1px); }
.footer-note { position: fixed; bottom: 28px; left: 0; right: 0; display: flex; justify-content: center; gap: 32px; z-index: 1; }
.footer-note a { font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; opacity: 0.7; cursor: pointer; }
.footer-note a:hover { opacity: 1; }
@media (max-width: 480px) { .footer-note { gap: 20px; bottom: 20px; } }
</style>
</head>
<body>

<div class="page">
  <p class="eyebrow">Halal food, mapped in NYC</p>
  <h1>Sofra</h1>
  <p class="tagline"><strong>Halal food, mapped across all five boroughs.</strong> No accounts, no ads.</p>
  <a href="https://apps.apple.com" class="cta">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
    Download on the App Store
  </a>
</div>

<nav class="footer-note">
  <a href="/privacy">Privacy Policy</a>

</nav>

</body>
</html>
