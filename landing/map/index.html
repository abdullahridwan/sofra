<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Map - Sofra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#FFFFFF; --border:#E7E3DE; --text:#2B2320; --muted:#7A6F66; --red:#E62336; }
@media (prefers-color-scheme: dark) { :root { --bg:#191210; --border:#352A26; --text:#EDE8E4; --muted:#8A7A72; } }
:root[data-theme="light"] { --bg:#FFFFFF; --border:#E7E3DE; --text:#2B2320; --muted:#7A6F66; }
:root[data-theme="dark"]  { --bg:#191210; --border:#352A26; --text:#EDE8E4; --muted:#8A7A72; }

html, body { height: 100%; overflow: hidden; font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: var(--bg); }

#map {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

.header {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 10;
}
.wordmark {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--text);
  text-decoration: none;
  background: var(--bg);
  padding: 10px 16px;
  border-radius: 12px;
  box-shadow: 0 2px 14px rgba(0,0,0,.1);
  border: 1px solid var(--border);
}
</style>
</head>
<body>

<iframe id="map" src="https://www.google.com/maps/d/embed?mid=1Pqgctzd1TbpfYLfOnLXEgiTVRLpwuj4&ehbc=2E312F" allowfullscreen></iframe>

<div class="header">
  <a href="/" class="wordmark">Sofra</a>
</div>

</body>
</html>
